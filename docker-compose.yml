version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: musicgpt
      POSTGRES_PASSWORD: musicgpt
      POSTGRES_DB: musicgpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicgpt"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
